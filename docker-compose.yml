services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: boet
      POSTGRES_PASSWORD: boet
      POSTGRES_DB: boet
    volumes:
      - boet-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boet"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3020
      PGHOST: db
      PGPORT: 5432
      PGUSER: boet
      PGPASSWORD: boet
      PGDATABASE: boet
      UPLOAD_DIR: /data/uploads
      FCM_SERVICE_ACCOUNT: ${FCM_SERVICE_ACCOUNT:-}
      # Local LLM for voice cleaning (no third-party cloud). Unset OLLAMA_URL to
      # disable and fall back to deterministic cleaning.
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b-instruct}
      # Keep the model warm so an idle gap doesn't cold-start (and fall back) the
      # next voice add. "-1" = always resident; "5m" = unload after 5 min idle.
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
      # EN->SV translation sidecar for recipe import. Unset to disable (recipes
      # then stay in their parsed language).
      TRANSLATE_URL: ${TRANSLATE_URL:-http://translate:7000}
      # OPT-IN cloud LLM for RECIPE parsing only (voice stays local). Set a free
      # NVIDIA NIM key (https://build.nvidia.com) to parse recipes on datacenter
      # GPUs in seconds instead of ~minute-long local CPU inference. Unset = local
      # ollama, nothing leaves home.
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-nvidia/nemotron-3-ultra-550b-a55b}
      # OPT-IN: point recipe STRUCTURING (the "first AI" tried, before falling
      # back to local ollama) at a DIFFERENT cloud provider than NVIDIA_* above —
      # any OpenAI-compatible endpoint works, e.g. OpenAI itself:
      #   STRUCTURE_LLM_API_KEY: sk-...
      #   STRUCTURE_LLM_BASE_URL: https://api.openai.com/v1
      #   STRUCTURE_LLM_MODEL: gpt-5.5
      # Unset = falls back to NVIDIA_API_KEY/NVIDIA_BASE_URL/NVIDIA_MODEL above.
      STRUCTURE_LLM_API_KEY: ${STRUCTURE_LLM_API_KEY:-}
      STRUCTURE_LLM_BASE_URL: ${STRUCTURE_LLM_BASE_URL:-}
      STRUCTURE_LLM_MODEL: ${STRUCTURE_LLM_MODEL:-}
      # OPT-IN: a SEPARATE cloud LLM endpoint/model just for EN->SV recipe
      # TRANSLATION (independent of STRUCTURE_LLM_*/NVIDIA_MODEL above). A
      # general-purpose instruct model translates recipe vocabulary noticeably
      # better than a reasoning model tuned for structured extraction. Unset
      # TRANSLATE_LLM_API_KEY to reuse NVIDIA_API_KEY/BASE_URL (same account,
      # still a different model by default); unset both keys to fall back to
      # the opus-mt sidecar below.
      TRANSLATE_LLM_API_KEY: ${TRANSLATE_LLM_API_KEY:-}
      TRANSLATE_LLM_BASE_URL: ${TRANSLATE_LLM_BASE_URL:-}
      TRANSLATE_LLM_MODEL: ${TRANSLATE_LLM_MODEL:-meta/llama-3.3-70b-instruct}
      # Discover: TheMealDB browse/search/import. Unset = public test key '1'
      # (rate-limited, single-ingredient filter only); set your paid key for the
      # full catalogue + multi-ingredient search.
      MEALDB_API_KEY: ${MEALDB_API_KEY:-}
      # Local speech-to-text for the kitchen display's voice-add flow (record a
      # clip on the tablet, transcribe here, auto-add via the existing voice-
      # cleaning pipeline — see BOET-API.md). Unset WHISPER_URL to disable (the
      # endpoint then returns 503 instead of silently doing nothing).
      WHISPER_URL: ${WHISPER_URL:-http://faster-whisper:8000}
      WHISPER_MODEL: ${WHISPER_MODEL:-deepdml/faster-whisper-large-v3-turbo-ct2}
    volumes:
      - boet-uploads:/data/uploads
    ports:
      # Exposed on the host (Unraid) as 3020 -> forwarded to boet.jabba.se
      - "3020:3020"

  # EN->SV recipe translation sidecar (opus-mt). Built from server/translate/.
  translate:
    build: ./server/translate
    restart: unless-stopped

  # Household-local LLM for voice cleaning. The model is auto-pulled by the
  # ollama-pull sidecar below — no manual step.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - boet-ollama:/root/.ollama

  # One-shot: waits for Ollama, pulls the voice model on every `up`, then exits.
  # Idempotent, so it self-heals if a recreate/volume wipe ever drops the model.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: "until ollama list >/dev/null 2>&1; do sleep 1; done; ollama pull ${OLLAMA_MODEL:-qwen3:4b-instruct}"
    restart: "no"

  # Local speech-to-text sidecar (faster-whisper-server, an OpenAI Whisper-API
  # compatible server) for the kitchen display's voice-add flow — see
  # server/src/whisper.js and BOET-API.md. CPU-only int8 for reasonable
  # latency; large-v3-turbo transcribes Swedish well (user-verified). Must be
  # the full "repo/name" HF model id — the bare "large-v3-turbo" isn't one of
  # faster-whisper's built-in short names (only large-v1/v2/v3) and 500s.
  faster-whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    restart: unless-stopped
    volumes:
      - boet-whisper:/root/.cache/huggingface
    environment:
      WHISPER__MODEL: ${WHISPER_MODEL:-deepdml/faster-whisper-large-v3-turbo-ct2}
      WHISPER__DEVICE: cpu
      WHISPER__COMPUTE_TYPE: int8

volumes:
  boet-db:
  boet-uploads:
  boet-ollama:
  boet-whisper:
