# Production stack for Unraid. Pulls the prebuilt server image from GHCR so
# Unraid's "check for updates" detects new versions of :latest.
#
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Exposed on the host as :3020 — point Nginx Proxy Manager (boet.jabba.se) at
# http://192.168.1.66:3020 and enable "Websockets Support" on the proxy host.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: boet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-boet}
      POSTGRES_DB: boet
    volumes:
      - boet-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boet"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    # Built on Playwright's official image (Node + prebuilt Chromium/Firefox/
    # WebKit) for the URL-scrape feature's headless-render fallback — a
    # meaningfully heavier pull than a plain Node image (~1.5-2GB vs ~150MB).
    # Only affects disk/pull time: the browser launches lazily per-scrape, not
    # resident, so idle RAM is unaffected.
    image: ghcr.io/karlmit/boet:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3020
      PGHOST: db
      PGPORT: 5432
      PGUSER: boet
      PGPASSWORD: ${POSTGRES_PASSWORD:-boet}
      PGDATABASE: boet
      UPLOAD_DIR: /data/uploads
      # Optional: mount a Firebase service-account JSON and point here to enable
      # push notifications. Leave unset to run fully self-hosted (WebSocket only).
      FCM_SERVICE_ACCOUNT: ${FCM_SERVICE_ACCOUNT:-}
      # Local LLM for voice cleaning — keeps the "no third-party cloud" promise.
      # Points at the ollama service below; unset OLLAMA_URL to disable (the server
      # then falls back to deterministic cleaning).
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b-instruct}
      # Keep the model resident so a long idle gap doesn't cold-start the next
      # voice add (a cold load can outrun the timeout and fall back to the
      # deterministic split). "-1" = always warm (~2.5–3 GB RAM held); "5m" =
      # unload after 5 min idle to free RAM (slow first request afterwards).
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
      # Optional tuning (sensible defaults in code):
      #   OLLAMA_NUM_CTX:    "4096" # context window; smaller = a touch less RAM
      #   OLLAMA_TIMEOUT_MS: "30000"
      # EN->SV translation sidecar for recipe import (opus-mt). Unset to disable
      # (recipes then stay in their parsed language).
      TRANSLATE_URL: ${TRANSLATE_URL:-http://translate:7000}
      # OPT-IN cloud LLM for RECIPE parsing only (voice cleaning stays local). Set a
      # free NVIDIA NIM key (https://build.nvidia.com) to parse recipes on datacenter
      # GPUs in seconds instead of ~minute-long local CPU inference — the one time
      # Boet reaches a third-party cloud, and only when you provide a key. Unset =
      # local ollama, nothing leaves home.
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-nvidia/nemotron-3-ultra-550b-a55b}
      # OPT-IN: point recipe STRUCTURING (the "first AI" tried, before falling
      # back to local ollama) at a DIFFERENT cloud provider than NVIDIA_* above —
      # any OpenAI-compatible endpoint works, e.g. OpenAI itself:
      #   STRUCTURE_LLM_API_KEY: sk-...
      #   STRUCTURE_LLM_BASE_URL: https://api.openai.com/v1
      #   STRUCTURE_LLM_MODEL: gpt-5.5
      # Unset = falls back to NVIDIA_API_KEY/NVIDIA_BASE_URL/NVIDIA_MODEL above.
      STRUCTURE_LLM_API_KEY: ${STRUCTURE_LLM_API_KEY:-}
      STRUCTURE_LLM_BASE_URL: ${STRUCTURE_LLM_BASE_URL:-}
      STRUCTURE_LLM_MODEL: ${STRUCTURE_LLM_MODEL:-}
      # OPT-IN: a SEPARATE cloud LLM endpoint/model just for EN->SV recipe
      # TRANSLATION (independent of STRUCTURE_LLM_*/NVIDIA_MODEL above). A
      # general-purpose instruct model translates recipe vocabulary noticeably
      # better than a reasoning model tuned for structured extraction. Unset
      # TRANSLATE_LLM_API_KEY to reuse NVIDIA_API_KEY/BASE_URL (same account,
      # still a different model by default); unset both keys to fall back to
      # the opus-mt sidecar.
      TRANSLATE_LLM_API_KEY: ${TRANSLATE_LLM_API_KEY:-}
      TRANSLATE_LLM_BASE_URL: ${TRANSLATE_LLM_BASE_URL:-}
      TRANSLATE_LLM_MODEL: ${TRANSLATE_LLM_MODEL:-meta/llama-3.3-70b-instruct}
      # Discover: browse/search/import recipes from TheMealDB (always an external
      # call when that screen is used — it's a public recipe catalogue, not user
      # data). Unset = public test key '1' (rate-limited, single-ingredient filter
      # only); set your paid key for the full catalogue + multi-ingredient search.
      MEALDB_API_KEY: ${MEALDB_API_KEY:-}
      # Local speech-to-text for the kitchen display's voice-add flow (record a
      # clip on the tablet, transcribe here, auto-add via the existing voice-
      # cleaning pipeline — see BOET-API.md). Unset WHISPER_URL to disable (the
      # endpoint then returns 503 instead of silently doing nothing).
      WHISPER_URL: ${WHISPER_URL:-http://faster-whisper:8000}
      WHISPER_MODEL: ${WHISPER_MODEL:-deepdml/faster-whisper-large-v3-turbo-ct2}
      # Instagram Reel recipe import. Instagram blocks unauthenticated
      # scraping outright as of 2026, so fetching a Reel's caption/video goes
      # through the Apify "Instagram Reel Scraper" actor (apify.com/apify/
      # instagram-reel-scraper) instead of self-hosting a scraper — sign up at
      # apify.com and set an API token. Unset APIFY_API_TOKEN = Instagram
      # imports fail with a "not configured" error; everything else in Boet
      # is unaffected.
      APIFY_API_TOKEN: ${APIFY_API_TOKEN:-}
      APIFY_INSTAGRAM_ACTOR: ${APIFY_INSTAGRAM_ACTOR:-apify~instagram-reel-scraper}
      # Video-understanding fallback (used only when a Reel's caption alone
      # isn't a complete recipe) needs a Gemini API key
      # (https://aistudio.google.com/apikey, has a free tier). Unset
      # GEMINI_API_KEY = caption-only import; Reels needing the video fail
      # with a "couldn't extract a recipe" error instead of falling back.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Overridable because Google's model ids/availability/pricing drift
      # over time (see server/src/gemini-video.js) — the "-latest" alias
      # tracks Google's current default Flash model rather than pinning a
      # version that may later be deprecated.
      GEMINI_RECIPE_VIDEO_MODEL: ${GEMINI_RECIPE_VIDEO_MODEL:-gemini-flash-latest}
      # Max Reel video size to download (larger videos are skipped, treated
      # the same as "video download failed").
      REEL_VIDEO_MAX_MB: ${REEL_VIDEO_MAX_MB:-200}
      REEL_VIDEO_TIMEOUT_SECONDS: ${REEL_VIDEO_TIMEOUT_SECONDS:-120}
      # How confident the small completeness-check model must be that a
      # Reel's caption alone is a full recipe before skipping the (slower,
      # costs a Gemini call) video-analysis fallback. Lower = trusts captions
      # more often; higher = falls back to video more readily.
      REEL_IMPORT_CONFIDENCE_THRESHOLD: ${REEL_IMPORT_CONFIDENCE_THRESHOLD:-0.75}
    volumes:
      - boet-uploads:/data/uploads
      # - ./fcm-service-account.json:/secrets/fcm.json:ro   # then set FCM_SERVICE_ACCOUNT=/secrets/fcm.json
    ports:
      - "3020:3020"

  # Web app (boetweb.jabba.se) — PIN-gated BFF + SPA, proxies /api, /uploads,
  # /ws through to `server` above. Built locally on Unraid (no GHCR image yet,
  # unlike `server` — add a publish workflow later if that becomes worth it).
  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - server
    environment:
      PORT: 3021
      API_URL: http://server:3020
      WEB_PIN: ${WEB_PIN}
      SESSION_SECRET: ${SESSION_SECRET}
    ports:
      # Point Nginx Proxy Manager (boetweb.jabba.se, a SEPARATE proxy host
      # from boet.jabba.se above) at this port and enable "Websockets
      # Support" — this BFF proxies /ws onward too.
      - "3021:3021"

  # EN->SV recipe translation sidecar (opus-mt, ~300 MB model baked into the
  # image at build time). Holds well under 1 GB RAM; safe to keep always-on.
  translate:
    build: ./server/translate
    restart: unless-stopped

  # Household-local LLM (Ollama) for voice cleaning. The model is pulled
  # automatically by the ollama-pull sidecar below — no manual step needed.
  # If the Unraid box has an NVIDIA GPU + container toolkit, uncomment the deploy
  # block for much faster inference.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - boet-ollama:/root/.ollama

  # One-shot: waits for Ollama, then pulls the voice model on every `up` and exits.
  # `ollama pull` is idempotent (a no-op once present), so this provisions a fresh
  # box AND self-heals — if a recreate/volume wipe drops the model, the next `up`
  # re-pulls it instead of voice silently degrading to the deterministic fallback.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434   # pull runs as a client into the ollama server's volume
    entrypoint: ["/bin/sh", "-c"]
    command: "until ollama list >/dev/null 2>&1; do sleep 1; done; ollama pull ${OLLAMA_MODEL:-qwen3:4b-instruct}"
    restart: "no"
    # RAM: qwen3:4b (Q4) needs ~2.5–3 GB while loaded. Don't hard-cap memory — a
    # `mem_limit` below the model size triggers OOM-kills mid-inference. To free RAM
    # between uses, set OLLAMA_KEEP_ALIVE on the server (above) instead. A *soft*
    # reservation is fine; an example (uncomment if you use it):
    # mem_reservation: 3g
    # deploy:                       # uncomment for NVIDIA GPU acceleration
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  # Local speech-to-text sidecar (faster-whisper-server, an OpenAI Whisper-API
  # compatible server) for the kitchen display's voice-add flow — see
  # server/src/whisper.js and BOET-API.md. CPU-only int8 for reasonable
  # latency; large-v3-turbo transcribes Swedish well (user-verified). Model
  # weights cache on the appdata share so they survive a container recreate.
  # WHISPER__MODEL must be the full "repo/name" HF model id — the bare
  # "large-v3-turbo" isn't one of faster-whisper's built-in short names (only
  # large-v1/v2/v3) and 500s; this is the community CTranslate2 conversion.
  faster-whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: faster-whisper
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /mnt/user/appdata/faster-whisper:/root/.cache/huggingface
    environment:
      WHISPER__MODEL: ${WHISPER_MODEL:-deepdml/faster-whisper-large-v3-turbo-ct2}
      WHISPER__DEVICE: cpu
      WHISPER__COMPUTE_TYPE: int8

volumes:
  boet-db:
  boet-uploads:
  boet-ollama:
