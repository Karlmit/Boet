# Production stack for Unraid. Pulls the prebuilt server image from GHCR so
# Unraid's "check for updates" detects new versions of :latest.
#
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Exposed on the host as :3020 — point Nginx Proxy Manager (boet.jabba.se) at
# http://192.168.1.66:3020 and enable "Websockets Support" on the proxy host.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: boet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-boet}
      POSTGRES_DB: boet
    volumes:
      - boet-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boet"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    image: ghcr.io/karlmit/boet:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3020
      PGHOST: db
      PGPORT: 5432
      PGUSER: boet
      PGPASSWORD: ${POSTGRES_PASSWORD:-boet}
      PGDATABASE: boet
      UPLOAD_DIR: /data/uploads
      # Optional: mount a Firebase service-account JSON and point here to enable
      # push notifications. Leave unset to run fully self-hosted (WebSocket only).
      FCM_SERVICE_ACCOUNT: ${FCM_SERVICE_ACCOUNT:-}
      # Local LLM for voice cleaning — keeps the "no third-party cloud" promise.
      # Points at the ollama service below; unset OLLAMA_URL to disable (the server
      # then falls back to deterministic cleaning).
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b-instruct}
      # Keep the model resident so a long idle gap doesn't cold-start the next
      # voice add (a cold load can outrun the timeout and fall back to the
      # deterministic split). "-1" = always warm (~2.5–3 GB RAM held); "5m" =
      # unload after 5 min idle to free RAM (slow first request afterwards).
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
      # Optional tuning (sensible defaults in code):
      #   OLLAMA_NUM_CTX:    "4096" # context window; smaller = a touch less RAM
      #   OLLAMA_TIMEOUT_MS: "30000"
      # EN->SV translation sidecar for recipe import (opus-mt). Unset to disable
      # (recipes then stay in their parsed language).
      TRANSLATE_URL: ${TRANSLATE_URL:-http://translate:7000}
      # OPT-IN cloud LLM for RECIPE parsing only (voice cleaning stays local). Set a
      # free NVIDIA NIM key (https://build.nvidia.com) to parse recipes on datacenter
      # GPUs in seconds instead of ~minute-long local CPU inference — the one time
      # Boet reaches a third-party cloud, and only when you provide a key. Unset =
      # local ollama, nothing leaves home.
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_MODEL: ${NVIDIA_MODEL:-nvidia/nemotron-3-ultra-550b-a55b}
      # OPT-IN: a SEPARATE cloud LLM endpoint/model just for EN->SV recipe
      # TRANSLATION (independent of NVIDIA_MODEL above, which is for recipe
      # structuring). A general-purpose instruct model translates recipe
      # vocabulary noticeably better than a reasoning model tuned for structured
      # extraction. Unset TRANSLATE_LLM_API_KEY to reuse NVIDIA_API_KEY/BASE_URL
      # (same account, still a different model by default); unset both keys to
      # fall back to the opus-mt sidecar.
      TRANSLATE_LLM_API_KEY: ${TRANSLATE_LLM_API_KEY:-}
      TRANSLATE_LLM_BASE_URL: ${TRANSLATE_LLM_BASE_URL:-}
      TRANSLATE_LLM_MODEL: ${TRANSLATE_LLM_MODEL:-meta/llama-3.3-70b-instruct}
      # Discover: browse/search/import recipes from TheMealDB (always an external
      # call when that screen is used — it's a public recipe catalogue, not user
      # data). Unset = public test key '1' (rate-limited, single-ingredient filter
      # only); set your paid key for the full catalogue + multi-ingredient search.
      MEALDB_API_KEY: ${MEALDB_API_KEY:-}
    volumes:
      - boet-uploads:/data/uploads
      # - ./fcm-service-account.json:/secrets/fcm.json:ro   # then set FCM_SERVICE_ACCOUNT=/secrets/fcm.json
    ports:
      - "3020:3020"

  # EN->SV recipe translation sidecar (opus-mt, ~300 MB model baked into the
  # image at build time). Holds well under 1 GB RAM; safe to keep always-on.
  translate:
    build: ./server/translate
    restart: unless-stopped

  # Household-local LLM (Ollama) for voice cleaning. The model is pulled
  # automatically by the ollama-pull sidecar below — no manual step needed.
  # If the Unraid box has an NVIDIA GPU + container toolkit, uncomment the deploy
  # block for much faster inference.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - boet-ollama:/root/.ollama

  # One-shot: waits for Ollama, then pulls the voice model on every `up` and exits.
  # `ollama pull` is idempotent (a no-op once present), so this provisions a fresh
  # box AND self-heals — if a recreate/volume wipe drops the model, the next `up`
  # re-pulls it instead of voice silently degrading to the deterministic fallback.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434   # pull runs as a client into the ollama server's volume
    entrypoint: ["/bin/sh", "-c"]
    command: "until ollama list >/dev/null 2>&1; do sleep 1; done; ollama pull ${OLLAMA_MODEL:-qwen3:4b-instruct}"
    restart: "no"
    # RAM: qwen3:4b (Q4) needs ~2.5–3 GB while loaded. Don't hard-cap memory — a
    # `mem_limit` below the model size triggers OOM-kills mid-inference. To free RAM
    # between uses, set OLLAMA_KEEP_ALIVE on the server (above) instead. A *soft*
    # reservation is fine; an example (uncomment if you use it):
    # mem_reservation: 3g
    # deploy:                       # uncomment for NVIDIA GPU acceleration
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

volumes:
  boet-db:
  boet-uploads:
  boet-ollama:
