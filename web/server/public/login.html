<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Boet</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/login.css" />
</head>
<body>
  <main class="card">
    <h1 class="wordmark">Boet</h1>
    <p class="tagline">Ange kodet för att fortsätta</p>
    <form id="pin-form" autocomplete="off">
      <input
        id="pin"
        name="pin"
        type="password"
        inputmode="numeric"
        pattern="[0-9]*"
        autofocus
        aria-label="PIN-kod"
      />
      <button type="submit">Fortsätt</button>
    </form>
    <p id="error" class="error" role="alert" hidden>Fel kod. Försök igen.</p>
  </main>
  <script src="/login.js"></script>
</body>
</html>
